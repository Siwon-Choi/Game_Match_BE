spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${SERVER_PORT:8080}
server.url=${SERVER_URL:http://localhost:${server.port}}

spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:31536000000}

custom.allowed.origins=${CUSTOM_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

file.upload-dir=${FILE_UPLOAD_DIR:${user.home}/GameMatch/uploads}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB

spring.sms.api-key=${SMS_API_KEY:}
spring.sms.api-secret=${SMS_API_SECRET:}
spring.sms.provider=${SMS_PROVIDER:https://api.coolsms.co.kr}
spring.sms.sender=${SMS_SENDER:}
